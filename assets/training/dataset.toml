# kohya_ss SDXL LoRA — dataset.toml
# Character-Consistency LoRA (siehe docs/T6-CHARACTER-CONSISTENCY-STRATEGY.md)
# Aufruf: sdxl_train_network.py --config_file dataset.toml
# ODER train_lora.sh (bereitet Env + ruft kohya auf)

[general]
shuffle_caption = true
caption_extension = ".caption"
keep_tokens = 0
# Instance-Prompt steht in jeder .caption-Datei (identisch für alle Bilder),
# plus optionales Pose-Suffix pro Bild.

[[datasets]]
resolution = 1024
batch_size = 4
enable_bucket = true
min_bucket_reso = 512
max_bucket_reso = 1536

  [[datasets.subsets]]
  image_dir = "/root/little-buddy-card/assets/dataset/katharina"
  num_repeats = 20          # 20 repeats × ~12 Bilder = ~240 train steps / epoch
  # class_tokens / instance_prompt werden über die .caption-Dateien je Bild gesetzt.
  # Empfohlen: jede .caption = Identischer Instance-Prompt + optionaler Pose-Zusatz.
