name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Build release ZIP (bundle + assets)
        run: npm run zip

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # The HACS install path uses the custom_components/little_buddy_card/
          # tree directly (HACS category=INTEGRATION downloads the whole dir).
          # The ZIP is a convenience for manual install (wget + unzip).
          files: |
            dist/little-buddy-card.zip
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
