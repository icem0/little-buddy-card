name: HACS Validate

on: [push, pull_request]

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS Action
        uses: hacs/action@main
        with:
          # v0.9.8+: back to HACS-Plugin (Dashboard) category.
          # For a pure Lovelace frontend card this is the correct category:
          # HACS downloads little-buddy-card.js to /hacsfiles/little-buddy-card/
          # and AUTO-registers the Lovelace resource via update_dashboard_resources().
          # No custom_components/, no manifest.json, no __init__.py needed.
          category: 'plugin'
