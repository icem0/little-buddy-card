name: HACS Validate

on: [push, pull_request]

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS Action
        uses: hacs/action@main
        with:
          # HACS GH-Action only accepts a small set: integration, appdaemon,
          # python_script, template, theme. Our manifest declares
          # integration_type: lovelace, which the action will validate against
          # the integration schema (HacsCategory.INTEGRATION).
          category: 'integration'
