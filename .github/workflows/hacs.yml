name: HACS Validate

on: [push, pull_request]

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS Action
        uses: hacs/action@main
        with:
          # HACS 2026-summer: register the card as a 'plugin' (frontend
          # resource) so HACS auto-adds /hacsfiles/<repo>/<file>.js to
          # the dashboard resources. This is what makes the card
          # appear in the "+ Add Card" picker.
          #
          # The repo also carries a custom_components/little_buddy_card/
          # tree (for HACS-Validate integration checks), but HACS
          # downloads only the single .js file (dist/little-buddy-card.js)
          # for runtime use.
          category: 'plugin'
