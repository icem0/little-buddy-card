name: HACS Validate

on: [push, pull_request]

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS Action
        uses: hacs/action@main
        with:
          # v0.9.5+: HACS-Integration-Category for native HA Updates panel.
          # The bundle lives at custom_components/little_buddy_card/frontend/
          # and is served by HA at /local/little_buddy_card/. The user adds
          # this as a Lovelace resource manually (HACS-Integration does
          # NOT auto-register Lovelace resources like HACS-Plugin does).
          category: 'integration'
